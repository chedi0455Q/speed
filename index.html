<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N30N RUN — Cyberpunk Infinite Runner</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Orbitron', 'monospace'],
            mono: ['Share Tech Mono', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #00ffe7;
      --pink:    #ff2d78;
      --yellow:  #f5e642;
      --bg:      #05050f;
      --surface: #0b0b1e;
      --border:  #1a1a3a;
    }

    html, body {
      background: var(--bg);
      color: #c8c8ff;
      font-family: 'Share Tech Mono', monospace;
      height: 100%;
      overflow: hidden;
      user-select: none;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.15) 2px,
        rgba(0,0,0,.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }
    
    #game-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #gameCanvas {
      display: block;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(0,255,231,.08),
        0 0 30px rgba(0,255,231,.12),
        0 0 80px rgba(255,45,120,.06);
      border-radius: 2px;
    }

    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: .6rem 1rem;
      pointer-events: none;
    }

    .hud-stat {
      font-family: 'Orbitron', monospace;
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .hud-val {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: rgba(5,5,15,.88);
      backdrop-filter: blur(2px);
      z-index: 10;
    }
    .screen.hidden { display: none; }

    .screen-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      letter-spacing: .08em;
      text-shadow: 0 0 20px var(--cyan), 0 0 60px var(--cyan);
    }

    .neon-btn {
      font-family: 'Orbitron', monospace;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: .7rem 2.5rem;
      border-radius: 2px;
      cursor: pointer;
      border: 1px solid var(--cyan);
      background: rgba(0,255,231,.07);
      color: var(--cyan);
      transition: all .2s ease;
      text-shadow: 0 0 8px var(--cyan);
      box-shadow: 0 0 12px rgba(0,255,231,.15), inset 0 0 12px rgba(0,255,231,.05);
    }
    .neon-btn:hover {
      background: rgba(0,255,231,.15);
      box-shadow: 0 0 24px rgba(0,255,231,.35), inset 0 0 20px rgba(0,255,231,.08);
    }
    .neon-btn.pink {
      border-color: var(--pink);
      color: var(--pink);
      background: rgba(255,45,120,.07);
      text-shadow: 0 0 8px var(--pink);
      box-shadow: 0 0 12px rgba(255,45,120,.15), inset 0 0 12px rgba(255,45,120,.05);
    }
    .neon-btn.pink:hover {
      background: rgba(255,45,120,.18);
      box-shadow: 0 0 24px rgba(255,45,120,.35), inset 0 0 20px rgba(255,45,120,.08);
    }

    #jump-pips {
      position: absolute;
      bottom: .8rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: .4rem;
      pointer-events: none;
    }
    .pip {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1px solid var(--cyan);
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      transition: all .15s ease;
    }
    .pip.used {
      background: transparent;
      box-shadow: none;
      opacity: .3;
    }

    #speed-bar-fill {
      transition: width .3s ease, background .3s ease;
      height: 100%;
      border-radius: 1px;
    }

    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; text-shadow: 0 0 20px var(--cyan), 0 0 60px var(--cyan); }
      20%,24%,55% { opacity: .4; text-shadow: none; }
    }
    .flicker { animation: flicker 5s infinite; }

    @keyframes glitch {
      0%,90%,100% { clip-path: none; transform: none; }
      92% { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); transform: translateX(-3px); }
      94% { clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); transform: translateX(3px); }
      96% { clip-path: none; transform: none; }
    }
    .glitch { animation: glitch 6s infinite; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp .4s ease forwards; }
  </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen gap-3">

  <div class="text-center z-10">
    <h1 class="font-display text-2xl font-black tracking-widest flicker glitch" style="color:var(--cyan)">
      N30N_RUN
    </h1>
    <p class="text-xs tracking-widest opacity-40 mt-1" style="color:var(--pink)"></p>
  </div>

  <div id="game-wrap" class="relative">

    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div>
        <p class="hud-stat" style="color:var(--cyan)">Score</p>
        <p class="hud-val" id="hud-score" style="color:var(--cyan); text-shadow: 0 0 10px var(--cyan)">0</p>
      </div>
      <div class="text-center">
        <p class="hud-stat text-center mb-1" style="color:var(--yellow)">Vitesse</p>
        <div style="width:100px; height:4px; background:var(--border); border-radius:1px; overflow:hidden;">
          <div id="speed-bar-fill" style="width:10%; background:var(--cyan);"></div>
        </div>
      </div>
      <div class="text-right">
        <p class="hud-stat" style="color:var(--pink)">Best</p>
        <p class="hud-val" id="hud-best" style="color:var(--pink); text-shadow: 0 0 10px var(--pink)">0</p>
      </div>
    </div>

    <div id="jump-pips">
      <div class="pip" id="pip-1"></div>
      <div class="pip" id="pip-2"></div>
    </div>

    <div class="screen fade-in" id="screen-start">
      <p class="screen-title text-3xl flicker" style="color:var(--cyan)">N30N_RUN</p>
      <p class="text-xs tracking-widest opacity-60" style="color:var(--yellow)"></p>
      <div class="flex flex-col gap-2 mt-2 items-center text-xs opacity-50 font-mono">
        <p>⎵ SPACE / ↑ FLÈCHE · Sauter</p>
        <p>TAP sur mobile · Sauter</p>
      </div>
      <button class="neon-btn mt-2" id="btn-start">[ DÉMARRER ]</button>
      <p class="text-xs opacity-30 font-mono mt-2">Double saut disponible — utilisez-le !</p>
    </div>

    <div class="screen hidden" id="screen-gameover">
      <p class="screen-title text-2xl" style="color:var(--pink); text-shadow: 0 0 20px var(--pink)">GAME OVER</p>
      <div class="text-center mt-1">
        <p class="text-xs tracking-widest opacity-50" style="color:var(--yellow)">SCORE FINAL</p>
        <p class="font-display text-3xl font-black mt-1" id="go-score" style="color:var(--cyan); text-shadow: 0 0 15px var(--cyan)">0</p>
      </div>
      <div class="text-center">
        <p class="text-xs tracking-widest opacity-50" style="color:var(--pink)">MEILLEUR SCORE</p>
        <p class="font-display text-lg font-bold mt-1" id="go-best" style="color:var(--pink)">0</p>
      </div>
      <p class="text-xs font-mono opacity-40 mt-1" id="go-new-record" style="color:var(--yellow)"></p>
      <button class="neon-btn pink mt-2" id="btn-restart">[ RECOMMENCER ]</button>
    </div>

  </div>

  <div class="text-xs font-mono opacity-20 tracking-widest z-10">
    SPACE / ↑ / TAP — SAUTER &nbsp;·&nbsp; DOUBLE SAUT AUTORISÉ
  </div>

  <script>
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas() {
    const maxW = Math.min(window.innerWidth  - 32, 800);
    const maxH = Math.min(window.innerHeight - 180, 340);
    canvas.width  = maxW;
    canvas.height = maxH;
  }
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); });

  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTone(freq, duration, type = 'square', vol = 0.15) {
    if (!audioCtx) return;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type      = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function soundJump()       { playTone(440,  .12, 'square',   .12); }
  function soundDoubleJump() { playTone(660,  .10, 'square',   .10); playTone(880, .08, 'sine', .06); }
  function soundDeath() {
    playTone(220, .15, 'sawtooth', .2);
    setTimeout(() => playTone(150, .2, 'sawtooth', .15), 100);
    setTimeout(() => playTone(80,  .3, 'sawtooth', .1), 250);
  }
  function soundRecord() {
    [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, .1, 'sine', .1), i * 80));
  }
  const COLORS = {
    bg:       '#05050f',
    grid:     'rgba(0,255,231,0.04)',
    cyan:     '#00ffe7',
    pink:     '#ff2d78',
    yellow:   '#f5e642',
    purple:   '#9b4dff',
    white:    '#e8e8ff',
    ground:   'rgba(0,255,231,0.15)',
  };

  const GRAVITY       = 0.55; 
  const JUMP_FORCE    = -13;    
  const GROUND_Y      = () => canvas.height - 60; 
  const SPEED_INIT    = 5;
  const SPEED_MAX     = 18;
  const SPEED_STEP    = 0.0008;


  const OBS_MIN_GAP   = 55;   
  const OBS_MAX_GAP   = 130;
  const state = {
    phase: 'start',  
    score: 0,
    best:  parseInt(localStorage.getItem('n30n_best') || '0'),
    speed: SPEED_INIT,
    frame: 0,
    newRecord: false,
  };

  const player = {
    x:        80,
    y:        0,
    w:        22,
    h:        22,
    vy:       0,       
    onGround: false,
    jumpsLeft: 2,      

    trailPoints: [],  
    squishY:    1,     
    squishX:    1,

    reset() {
      this.y         = GROUND_Y() - this.h;
      this.vy        = 0;
      this.onGround  = true;
      this.jumpsLeft = 2;
      this.trailPoints = [];
      this.squishY   = 1;
      this.squishX   = 1;
    },

    jump() {
      if (this.jumpsLeft <= 0) return;
      const isDouble = !this.onGround;
      this.vy        = JUMP_FORCE;
      this.onGround  = false;
      this.jumpsLeft--;
      this.squishY = 0.5;
      this.squishX = 1.5;

      if (isDouble) soundDoubleJump();
      else          soundJump();
    },

    update() {
      this.vy += GRAVITY;
      this.y  += this.vy;

      // Collision sol
      const ground = GROUND_Y() - this.h;
      if (this.y >= ground) {
        this.y        = ground;
        this.vy       = 0;
        this.onGround = true;
        this.jumpsLeft = 2;
      } else {
        this.onGround = false;
      }

      this.squishY += (1 - this.squishY) * 0.25;
      this.squishX += (1 - this.squishX) * 0.25;
      if (state.frame % 2 === 0) {
        this.trailPoints.unshift({ x: this.x, y: this.y, alpha: 0.4 });
        if (this.trailPoints.length > 8) this.trailPoints.pop();
      }
      this.trailPoints.forEach(p => { p.alpha *= 0.78; p.x -= 1; });
    },

    draw() {
      const cx = this.x + this.w / 2;
      const cy = this.y + this.h / 2;
      const hw = (this.w / 2) * this.squishX;
      const hh = (this.h / 2) * this.squishY;

      this.trailPoints.forEach((p, i) => {
        const ratio = 1 - i / this.trailPoints.length;
        ctx.save();
        ctx.globalAlpha = p.alpha * ratio;
        ctx.fillStyle   = COLORS.cyan;
        ctx.fillRect(p.x, p.y, this.w * ratio * .7, this.h * ratio * .7);
        ctx.restore();
      });
      ctx.save();
      ctx.shadowColor = COLORS.cyan;
      ctx.shadowBlur  = 18;
      ctx.fillStyle = COLORS.cyan;
      ctx.fillRect(cx - hw, cy - hh, hw * 2, hh * 2);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth   = 1.5;
      ctx.strokeRect(cx - hw + 2, cy - hh + 2, hw * 2 - 4, hh * 2 - 4);

      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(cx + 2, cy - 3, 5, 5);

      ctx.restore();
    },
    hitbox() {
      const margin = 4;
      return {
        x: this.x + margin,
        y: this.y + margin,
        w: this.w - margin * 2,
        h: this.h - margin * 2,
      };
    },
  };
  const obstacles = [];

  const OBS_TYPES = [
    { tag: 'low',   minH: 24, maxH: 38, color: COLORS.pink,   glow: COLORS.pink   }, 
    { tag: 'tall',  minH: 45, maxH: 70, color: COLORS.purple, glow: COLORS.purple }, 
    { tag: 'spike', minH: 20, maxH: 20, color: COLORS.yellow, glow: COLORS.yellow },
  ];

  function spawnObstacle() {
    const type = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
    const h    = type.minH + Math.random() * (type.maxH - type.minH);
    const w    = type.tag === 'spike' ? 18 : 16 + Math.random() * 12;

    obstacles.push({
      x: canvas.width + 10,
      y: GROUND_Y() - h,
      w, h,
      type: type.tag,
      color: type.color,
      glow:  type.glow,
    });
  }

  let nextObstacleIn = 80;

  function updateObstacles() {
    nextObstacleIn--;
    if (nextObstacleIn <= 0) {
      spawnObstacle();
      const gap    = OBS_MIN_GAP + Math.random() * (OBS_MAX_GAP - OBS_MIN_GAP);
      nextObstacleIn = Math.floor(gap / (state.speed / SPEED_INIT));
    }

    obstacles.forEach(o => { o.x -= state.speed; });
    while (obstacles.length && obstacles[0].x + obstacles[0].w < 0) obstacles.shift();
  }

  function drawObstacles() {
    obstacles.forEach(o => {
      ctx.save();
      ctx.shadowColor = o.glow;
      ctx.shadowBlur  = 14;

      if (o.type === 'spike') {
        ctx.fillStyle = o.color;
        ctx.beginPath();
        ctx.moveTo(o.x,           o.y + o.h);
        ctx.lineTo(o.x + o.w / 2, o.y);
        ctx.lineTo(o.x + o.w,     o.y + o.h);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#ffffff44';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else {
        ctx.fillStyle = o.color + '33';
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = o.color;
        ctx.lineWidth   = 1.5;
        ctx.strokeRect(o.x, o.y, o.w, o.h);
        ctx.globalAlpha = .3;
        ctx.beginPath();
        ctx.moveTo(o.x + o.w / 2, o.y + 4);
        ctx.lineTo(o.x + o.w / 2, o.y + o.h - 4);
        ctx.stroke();
      }
      ctx.restore();
    });
  }

  function checkCollisions() {
    const hb = player.hitbox();
    return obstacles.some(o => {
      const ob = o.type === 'spike'
        ? { x: o.x + 3, y: o.y + 6, w: o.w - 6, h: o.h - 6 }
        : o;
      return (
        hb.x < ob.x + ob.w &&
        hb.x + hb.w > ob.x &&
        hb.y < ob.y + ob.h &&
        hb.y + hb.h > ob.y
      );
    });
  }

  const buildings = Array.from({ length: 20 }, (_, i) => ({
    x:     i * 80 - 40,
    w:     30 + Math.random() * 50,
    h:     40 + Math.random() * 100,
    color: Math.random() > .5 ? '#0a0a2a' : '#06061a',
    windows: Array.from({ length: 6 }, () => ({
      wx: Math.random(),
      wy: Math.random(),
      on: Math.random() > .4,
      c:  Math.random() > .5 ? COLORS.cyan : COLORS.pink,
    })),
  }));

  let bgScrollX = 0;   

  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0,   '#05050f');
    grad.addColorStop(.6,  '#08081c');
    grad.addColorStop(1,   '#0a0420');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth   = 1;
    const cols = 20;
    for (let i = 0; i <= cols; i++) {
      const x = ((i / cols) * canvas.width + bgScrollX) % canvas.width;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, GROUND_Y());
      ctx.stroke();
    }
    const rows = 10;
    for (let i = 0; i <= rows; i++) {
      const y = (i / rows) * GROUND_Y();
      ctx.globalAlpha = .4 + (i / rows) * .6;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    const bScrollX = (bgScrollX * 0.3) % (buildings.length * 80);
    buildings.forEach(b => {
      const bx = (b.x - bScrollX * 0.3 + buildings.length * 80) % (buildings.length * 80 + 100) - 80;
      const by = GROUND_Y() - b.h;

      ctx.fillStyle = b.color;
      ctx.fillRect(bx, by, b.w, b.h);

      b.windows.forEach(w => {
        if (!w.on) return;
        ctx.save();
        ctx.globalAlpha = .6;
        ctx.fillStyle   = w.c;
        ctx.fillRect(bx + w.wx * (b.w - 6), by + w.wy * (b.h - 6), 3, 3);
        ctx.restore();
      });

      ctx.save();
      ctx.strokeStyle = 'rgba(0,255,231,.05)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, b.w, b.h);
      ctx.restore();
    });

    bgScrollX -= state.speed * 0.4;
  }

  function drawGround() {
    const gy = GROUND_Y();
    ctx.save();
    ctx.shadowColor = COLORS.cyan;
    ctx.shadowBlur  = 12;
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(canvas.width, gy);
    ctx.stroke();
    const groundGrad = ctx.createLinearGradient(0, gy, 0, gy + 30);
    groundGrad.addColorStop(0, 'rgba(0,255,231,.08)');
    groundGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, gy, canvas.width, 30);
    ctx.restore();
    ctx.save();
    ctx.strokeStyle = 'rgba(0,255,231,.2)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([20, 40]);
    ctx.lineDashOffset = -(state.frame * state.speed * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, gy + 8);
    ctx.lineTo(canvas.width, gy + 8);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  const particles = [];

  function spawnDeathParticles() {
    const cx = player.x + player.w / 2;
    const cy = player.y + player.h / 2;
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        alpha: 1,
        size: 2 + Math.random() * 4,
        color: Math.random() > .5 ? COLORS.cyan : COLORS.pink,
      });
    }
  }

  function updateDrawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.2;
      p.alpha -= 0.04;
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 8;
      ctx.fillStyle   = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      ctx.restore();
    }
  }

  function updateScore() {
    state.score = Math.floor(state.frame * state.speed / 10);
    document.getElementById('hud-score').textContent = state.score;
    document.getElementById('hud-best').textContent  = state.best;
    const pct = ((state.speed - SPEED_INIT) / (SPEED_MAX - SPEED_INIT)) * 100;
    const bar = document.getElementById('speed-bar-fill');
    bar.style.width      = Math.min(100, pct) + '%';
    if (pct < 40)      bar.style.background = COLORS.cyan;
    else if (pct < 75) bar.style.background = COLORS.yellow;
    else               bar.style.background = COLORS.pink;
  }

  function updateJumpPips() {
    document.getElementById('pip-1').className = 'pip' + (player.jumpsLeft < 1 ? ' used' : '');
    document.getElementById('pip-2').className = 'pip' + (player.jumpsLeft < 2 ? ' used' : '');
  }
  function gameLoop() {
    if (state.phase !== 'playing') return;

    state.frame++;
    if (state.speed < SPEED_MAX) state.speed += SPEED_STEP * state.speed;
    player.update();
    updateObstacles();
    updateScore();
    updateJumpPips();
    drawBackground();
    drawGround();
    drawObstacles();
    player.draw();
    updateDrawParticles();
    if (checkCollisions()) {
      triggerDeath();
      return;
    }

    requestAnimationFrame(gameLoop);
  }
  function startGame() {
    ensureAudio();
    state.phase    = 'playing';
    state.score    = 0;
    state.speed    = SPEED_INIT;
    state.frame    = 0;
    state.newRecord = false;
    obstacles.length   = 0;
    particles.length   = 0;
    nextObstacleIn     = 80;

    player.reset();
    document.getElementById('screen-start').classList.add('hidden');
    document.getElementById('screen-gameover').classList.add('hidden');

    requestAnimationFrame(gameLoop);
  }

  function triggerDeath() {
    state.phase = 'dead';
    soundDeath();
    spawnDeathParticles();
    if (state.score > state.best) {
      state.best = state.score;
      state.newRecord = true;
      localStorage.setItem('n30n_best', state.best);
      soundRecord();
    }
    document.getElementById('go-score').textContent    = state.score;
    document.getElementById('go-best').textContent     = state.best;
    document.getElementById('go-new-record').textContent =
      state.newRecord ? '★ NOUVEAU RECORD ! ★' : '';
    function deathAnimation() {
      drawBackground();
      drawGround();
      drawObstacles();
      player.draw();
      updateDrawParticles();
      if (particles.length > 0) requestAnimationFrame(deathAnimation);
      else showGameOver();
    }
    requestAnimationFrame(deathAnimation);
  }

  function showGameOver() {
    const screen = document.getElementById('screen-gameover');
    screen.classList.remove('hidden');
    screen.classList.add('fade-in');
  }

  function idleLoop() {
    if (state.phase !== 'start') return;
    drawBackground();
    drawGround();
    // Joueur qui bounce sur place
    player.y = GROUND_Y() - player.h + Math.sin(Date.now() * .003) * 5;
    player.draw();
    requestAnimationFrame(idleLoop);
  }

  function handleJump() {
    ensureAudio();
    if (state.phase === 'playing') {
      player.jump();
    } else if (state.phase === 'start') {
      startGame();
    }
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      handleJump();
    }
    if (e.code === 'Enter' && state.phase === 'dead') startGame();
  });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); handleJump(); }, { passive: false });
  canvas.addEventListener('mousedown',  () => handleJump());
  document.getElementById('btn-start').addEventListener('click',   () => { ensureAudio(); startGame(); });
  document.getElementById('btn-restart').addEventListener('click', () => { ensureAudio(); startGame(); });
  player.reset();
  document.getElementById('hud-best').textContent = state.best;
  idleLoop();

  </script>
</body>
</html>
